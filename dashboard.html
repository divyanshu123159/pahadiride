<main class="auth-container">
    <div class="auth-card">
        <h2>Driver Dashboard</h2>
        <p>Update your ride details for today.</p>
        
        <form id="updateRouteForm" class="auth-form">
            <div class="input-group">
                <label>Registered Phone Number</label>
                <input type="tel" id="login-phone" placeholder="9876543210" required>
            </div>
            <hr>
            <div class="input-group">
                <label>Current Route (From - To)</label>
                <input type="text" id="update-route" placeholder="e.g., Tehri - Dehradun" required>
            </div>
            <div class="input-group">
                <label>New Price (₹)</label>
                <input type="number" id="update-price" placeholder="400" required>
            </div>
            <button type="submit" class="proceed-btn">Update My Ride</button>
        </form>
    </div>
</main>
