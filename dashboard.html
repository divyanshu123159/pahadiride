<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Manager | PahadiRide</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Targeted spacing fixes */
        .dashboard-header {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Reduces gap between name and button */
            margin-bottom: 25px;
            padding: 10px;
        }
        .driver-info-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .fleet-title {
            margin: 20px 0 10px 0; /* Tightens gap before the list starts */
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .quick-add-btn {
            width: fit-content;
            padding: 10px 20px;
            background: #10b981;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="bg-gray">

    <nav class="navbar dashboard-nav">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Pahadi<span>Ride</span></a></div>
        <div class="nav-links">
            <button class="sign-in-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <div class="driver-info-box">
                <div class="driver-avatar"><i class="fa-solid fa-user-tie"></i></div>
                <div>
                    <h2 id="driver-name-display" style="margin:0; font-size: 1.6rem;">Divyanshu Rudola</h2>
                    <p id="driver-phone-display" style="margin:2px 0; color: #64748b; font-size: 0.9rem;">+91 7983447349</p>
                </div>
            </div>
            
            <button onclick="openModal('add')" class="proceed-btn quick-add-btn">
                <i class="fa-solid fa-plus"></i> Add New Vehicle
            </button>
        </div>

        <h3 class="fleet-title">
            <i class="fa-solid fa-car-side" style="color: #2563eb;"></i> Your Active Fleet
        </h3>
        
        <div id="fleet-grid" style="display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">
            </div>
    </main>

    <div id="vehicle-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; padding:20px; overflow-y:auto;">
        <div class="dashboard-card" style="max-width:480px; margin: 20px auto; background:white; border-radius: 12px; overflow: hidden;">
            <div class="card-header" style="background: #2563eb; color: white; padding: 15px; display: flex; justify-content: space-between;">
                <h3 id="modal-title" style="margin:0;">Vehicle Details</h3>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
            </div>
            <div class="card-body" style="padding: 20px;">
                <form id="fleet-form" onsubmit="saveVehicle(event)">
                    <div class="form-row">
                        <div class="input-group"><label>Model</label><input type="text" id="v-model" required></div>
                        <div class="input-group"><label>RC Number</label><input type="text" id="v-rc" maxlength="10" required></div>
                    </div>
                    <div class="input-group">
                        <label>Trip Category</label>
                        <select id="v-type" required onchange="adjustFields()">
                            <option value="Sharing">Sharing (Per Seat)</option>
                            <option value="Full Vehicle">Full Car / Emergency</option>
                            <option value="Both">Both</option>
                        </select>
                    </div>
                      <div class="form-row">
    <div class="input-group">
        <label>From</label>
        <select id="v-from" required>
            <option value="Tehri Garhwal">Tehri Garhwal</option>
            <option value="Dehradun">Dehradun</option>
            <option value="Rishikesh">Rishikesh</option>
            <option value="Srinagar">Srinagar</option>
            <option value="Devprayag">Devprayag</option>
            <option value="Chamba">Chamba</option>
            <option value="Uttarkashi">Uttarkashi</option>
            <option value="Delhi (NCR)">Delhi (NCR)</option>
            <option value="Anywhere">Anywhere (All Uttarakhand)</option>
        </select>
    </div>
    <div class="input-group">
        <label>To</label>
        <select id="v-to" required>
            <option value="Tehri Garhwal">Tehri Garhwal</option>
            <option value="Dehradun">Dehradun</option>
            <option value="Rishikesh">Rishikesh</option>
            <option value="Srinagar">Srinagar</option>
            <option value="Devprayag">Devprayag</option>
            <option value="Chamba">Chamba</option>
            <option value="Uttarkashi">Uttarkashi</option>
            <option value="Delhi (NCR)">Delhi (NCR)</option>
            <option value="Anywhere">Anywhere (All Uttarakhand)</option>
        </select>
    </div>
</div>
                    <div class="form-row">
                        <div class="input-group"><label>Price (₹)</label><input type="number" id="v-price"></div>
                        <div class="input-group"><label>Seats</label><input type="number" id="v-seats"></div>
                    </div>
                    <button type="submit" id="save-btn" class="proceed-btn" style="margin-top:15px;">Save Vehicle</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const databaseURL = "https://script.google.com/macros/s/AKfycbzyPaN76nwkLSi6J7voX32iItepO9fUA1AzFQs5WImyxwnQqGPZXlI23WLp5lUXX0I/exec";
        const phone = localStorage.getItem('pahadiRideUser');
        const pass = localStorage.getItem('pahadiRidePass');
        let myFleet = [];

        document.addEventListener('DOMContentLoaded', loadDashboard);

        async function loadDashboard() {
            if (!phone || !pass) return;
            try {
                const response = await fetch(`${databaseURL}?phone=${phone}&password=${pass}`);
                const data = await response.json();
                if (data.found) {
                    myFleet = data.fleet;
                    renderFleet();
                }
            } catch (err) { console.error(err); }
        }

        function renderFleet() {
            const grid = document.getElementById('fleet-grid');
            grid.innerHTML = myFleet.map((car, i) => `
                <div class="dashboard-card" style="border-left: 4px solid ${car.trip_type === 'Full Vehicle' ? '#ef4444' : '#3b82f6'}; padding: 15px;">
                    <div style="display:flex; justify-content:space-between;">
                        <h4 style="margin:0;">${car.vehicle}</h4>
                        <span style="font-size:0.7rem; background:#f1f5f9; padding:2px 6px; border-radius:4px;">${car.trip_type}</span>
                    </div>
                    <p style="font-size:0.8rem; color:#64748b; margin:5px 0;">${car.rc_number}</p>
                    <div style="margin-top:10px; display:flex; gap:8px;">
                        <button onclick="openModal('edit', ${i})" style="flex:1; padding:6px; font-size:0.8rem; border:1px solid #e2e8f0; border-radius:4px;">Edit</button>
                        <button onclick="removeCar('${car.rc_number}')" style="flex:1; padding:6px; font-size:0.8rem; background:#fee2e2; color:#ef4444; border:none; border-radius:4px;">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(mode, index = null) {
            document.getElementById('vehicle-modal').style.display = 'block';
            if (mode === 'edit') {
                const c = myFleet[index];
                document.getElementById('v-model').value = c.vehicle;
                document.getElementById('v-rc').value = c.rc_number;
                document.getElementById('v-type').value = c.trip_type;
                document.getElementById('v-from').value = c.from;
                document.getElementById('v-to').value = c.to;
                document.getElementById('v-price').value = c.price;
                document.getElementById('v-seats').value = c.seats;
            }
        }

        function closeModal() { document.getElementById('vehicle-modal').style.display = 'none'; }
        
        function adjustFields() {
            if(document.getElementById('v-type').value === "Full Vehicle") {
                document.getElementById('v-from').value = "Anywhere";
                document.getElementById('v-to').value = "Anywhere";
            }
        }

        async function saveVehicle(event) {
    event.preventDefault();
    
    // 1. Clean the RC Number (Remove spaces and make Uppercase)
    const rcInput = document.getElementById('v-rc').value.toUpperCase().replace(/\s/g, '');
    
    // 2. The Indian RC Pattern
    // Matches: 2 Letters (State) + 2 Digits (District) + 1-2 Letters + 4 Digits
    const rcPattern = /^[A-Z]{2}[0-9]{2}[A-Z]{1,2}[0-9]{4}$/;

    if (!rcPattern.test(rcInput)) {
        // Blocks the save if the format is wrong
        alert("🚨 INVALID RC NUMBER!\n\nPlease use the correct format: UK07AB1234\n(No spaces, start with State code)");
        document.getElementById('v-rc').focus();
        document.getElementById('v-rc').style.border = "2px solid #ef4444";
        return; // This is the 'Blocker' - the code stops here!
    }

    // 3. If validation passes, proceed to save
    const btn = document.getElementById('save-btn');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
    btn.disabled = true;

    const tripData = {
        action: "updateTrip",
        phone: phone,
        password: pass,
        name: document.getElementById('driver-name-display').innerText,
        vehicle: document.getElementById('v-model').value,
        rc_number: rcInput, // Sends the cleaned RC number
        from: document.getElementById('v-from').value || "Anywhere",
        to: document.getElementById('v-to').value || "Anywhere",
        price: document.getElementById('v-price').value || "0",
        seats: document.getElementById('v-seats').value || "4",
        trip_type: document.getElementById('v-type').value,
        time: "Flexible"
    };

    try {
        await fetch(databaseURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(tripData) });
        alert("✅ Success! Vehicle listing updated.");
        location.reload(); // Refreshes to show the new card
    } catch (err) {
        alert("❌ Connection Error. Check your internet.");
        btn.disabled = false;
        btn.innerHTML = "Save Vehicle";
    }
}
async function removeCar(rc) {
    if (!confirm(`Are you sure you want to remove vehicle ${rc} from your fleet?`)) {
        return; // User cancelled
    }

    // Visual feedback: find the card and make it look "loading"
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "Removing...";
    btn.disabled = true;

    const deleteData = {
        action: "deleteVehicle",
        phone: localStorage.getItem('pahadiRideUser'),
        rc_number: rc
    };

    try {
        // We use POST to send the delete command safely
        await fetch(databaseURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(deleteData)
        });
        
        alert("Vehicle removed from fleet.");
        location.reload(); // Refresh to show the updated list
    } catch (err) {
        alert("Failed to remove vehicle. Check your connection.");
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
    </script>
</body>

</html>
