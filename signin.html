<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | PahadiRide</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray">

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Pahadi<span>Ride</span></a></div>
        <div class="nav-links">
            <a href="index.html" class="help-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Sign in to manage your rides or listings.</p>
            </div>

            <form action="index.html" method="GET" class="auth-form">
                <div class="input-group">
                    <label>Phone Number or Email</label>
                    <input type="text" placeholder="Enter your details" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="proceed-btn auth-btn">Sign In</button>
            </form>

            <div class="auth-footer">
    <p>Don't have an account? <a href="signup.html">Create one now</a></p>
</div>
        </div>
    </main>

</body>
</html>
