<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ZipHill</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>
<body class="bg-gray">

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Zip<span>Hill</span></a></div>
        <div class="nav-links">
            <a href="index.html" class="help-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Sign in to manage your rides or listings.</p>
            </div>

            <form id="signin-form" class="auth-form">
                <div class="input-group">
                    <label>Registered Phone Number</label>
                    <input type="tel" id="login-phone" pattern="[0-9]{10}" placeholder="Enter your 10-digit number" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                     <p id="login-error" style="color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; font-weight: 500;">
                        <i class="fa-solid fa-circle-exclamation"></i> Incorrect phone number or password.
                    </p>
                   
                </div>

                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="proceed-btn auth-btn" id="login-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create one now</a></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
<script>
// Override login error to show inline instead of alert
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("signin-form");
    if (!form) return;
    form.addEventListener("submit", function(e) {
        e.preventDefault();
        const phone = document.getElementById("login-phone").value;
        const pass = document.getElementById("login-password").value;
        const btn = document.getElementById("login-btn");
        const errorDiv = document.getElementById("login-error");
        const databaseURL = "https://script.google.com/macros/s/AKfycbw30qgkPH8ljRmoCpB1XV6zIaiD5PcKsU1HFt1KWEkZ4KM2pVCEMlJbW9g4kYjIo_c/exec";
        btn.innerHTML = "Checking...";
        errorDiv.style.display = "none";
        fetch(databaseURL + "?phone=" + encodeURIComponent(phone) + "&password=" + encodeURIComponent(pass))
        .then(r => r.json())
        .then(data => {
            if (data.found) {
                localStorage.setItem("zipHillUser", phone);
                localStorage.setItem("zipHillPass", pass);
                window.location.href = "dashboard.html";
            } else {
                errorDiv.style.display = "block";
                btn.innerHTML = "Sign In";
            }
        })
        .catch(() => {
            errorDiv.style.display = "block";
            btn.innerHTML = "Sign In";
        });
    }, true); // capture phase so it fires before script.js
});
</script>
</body>
</html>
