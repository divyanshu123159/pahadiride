<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | PahadiRide</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray">

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Pahadi<span>Ride</span></a></div>
        <div class="nav-links">
            <a href="signin.html" class="help-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your registered phone number and we will help you get back into your account.</p>
            </div>

            <form id="reset-form" class="auth-form" onsubmit="handleReset(event)">
                <div class="input-group">
                    <label>Registered Phone Number</label>
                    <input type="tel" id="reset-phone" pattern="[0-9]{10}" placeholder="e.g., 9876543210" required>
                </div>

                <div id="reset-success" class="success-toast" style="display: none; margin-top: 0.5rem;">
                    <i class="fa-solid fa-circle-check"></i> Reset instructions sent to your number!
                </div>

                <button type="submit" class="proceed-btn auth-btn" id="reset-btn">Send Reset Link</button>
            </form>

            <div class="auth-footer" style="margin-top: 1.5rem; border-top: 1px dashed #cbd5e1; padding-top: 1.5rem;">
                <p>Lost access to your number?</p>
                <button class="proceed-btn support-btn" style="width: 100%; margin-top: 0.5rem; background-color: #25d366;" onclick="window.open('https://wa.me/917983447349?text=Hi%20PahadiRide,%20I%20forgot%20my%20password%20and%20need%20help%20resetting%20it.', '_blank')">
                    <i class="fa-brands fa-whatsapp"></i> Contact Admin
                </button>
            </div>
        </div>
    </main>

    <script>
        function handleReset(event) {
            event.preventDefault(); // Stop page reload
            
            const btn = document.getElementById('reset-btn');
            const successToast = document.getElementById('reset-success');
            
            // 1. Change button text to show it's "loading"
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            btn.style.opacity = '0.7';

            // 2. Simulate a 1.5 second network delay, then show success
            setTimeout(() => {
                btn.innerHTML = 'Send Reset Link';
                btn.style.opacity = '1';
                successToast.style.display = 'flex';
                
                // 3. Wait 3 more seconds, then send them back to login
                setTimeout(() => {
                    window.location.href = 'signin.html';
                }, 3000);
                
            }, 1500);
        }
    </script>
</body>
</html>
