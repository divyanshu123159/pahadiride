<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | PahadiRide</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray">

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Pahadi<span>Ride</span></a></div>
        <div class="nav-links">
            <a href="index.html" class="help-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card" style="max-width: 32rem;">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Join PahadiRide to find rides or list your vehicle.</p>
            </div>

            <div class="account-type-toggle">
                <button type="button" class="type-btn active" id="btn-passenger" onclick="setAccountType('passenger')">
                    <i class="fa-solid fa-user"></i> Passenger
                </button>
                <button type="button" class="type-btn" id="btn-driver" onclick="setAccountType('driver')">
                    <i class="fa-solid fa-steering-wheel"></i> Driver
                </button>
            </div>

           <form id="registrationForm" class="auth-form" onsubmit="handleSignup(event)">
                
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="e.g., Divyansu Rudola" required>
                </div>
                
                <div class="input-group">
                    <label>Phone Number (10 digits)</label>
                    <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="9876543210" required>
                </div>

                <div class="input-group">
                    <label>Create Password</label>
                    <input type="password" id="signup-password" placeholder="Create a strong password" required>
                </div>

                <div id="driver-fields" class="driver-extra-fields">
                    <div class="input-group">
                        <label>Vehicle Model</label>
                        <input type="text" id="signup-vehicle" placeholder="e.g., Mahindra Bolero">
                    </div>
                    <div class="input-group">
                        <label>Vehicle Number (RC)</label>
                        <input type="text" id="signup-rc" placeholder="e.g., UK 07 TA 1234">
                    </div>
                </div>

                <div class="auth-options" style="margin-top: 0.5rem;">
                    <label class="remember-me" style="font-size: 0.8rem; align-items: flex-start;">
                        <input type="checkbox" required style="margin-top: 0.2rem;"> 
                        <span>I agree to the Terms & Conditions and consent to share my contact details.</span>
                    </label>
                </div>

                <div id="signup-success" class="success-toast" style="display: none; margin-top: 0.5rem;">
                    <i class="fa-solid fa-circle-check"></i> Account created successfully!
                </div>

                <button type="submit" class="proceed-btn auth-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="signin.html">Sign In</a></p>
            </div>
        </div>
    </main>

   <script>
    let currentAccountType = 'passenger';

    // 1. THIS IS THE NEW PART: Check the URL when the page loads
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        if(params.get('type') === 'driver') {
            // Automatically switch to driver mode if the URL says ?type=driver
            setAccountType('driver');
        }
    });

    // 2. The function that switches the form (Same as before)
    function setAccountType(type) {
        currentAccountType = type;
        const btnPassenger = document.getElementById('btn-passenger');
        const btnDriver = document.getElementById('btn-driver');
        const driverFields = document.getElementById('driver-fields');
        const vehicleInput = document.getElementById('signup-vehicle');
        const rcInput = document.getElementById('signup-rc');

        if (type === 'driver') {
            btnDriver.classList.add('active');
            btnPassenger.classList.remove('active');
            driverFields.style.display = 'flex';
            vehicleInput.required = true;
            rcInput.required = true;
        } else {
            btnPassenger.classList.add('active');
            btnDriver.classList.remove('active');
            driverFields.style.display = 'none';
            vehicleInput.required = false;
            rcInput.required = false;
        }
    }

    // 3. The Submit Button (Same as before)
    function handleSignup(event) {
        event.preventDefault(); 
        const successToast = document.getElementById('signup-success');
        successToast.style.display = 'flex';
        setTimeout(() => {
            window.location.href = 'signin.html';
        }, 2000);
    }
</script>
</body>

</html>
